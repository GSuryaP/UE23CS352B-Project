<!DOCTYPE html>
<html>
<head>
    <title>View User Expenses - Expense Tracker</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0f766e;
            --primary-light: #14b8a6;
            --accent: #f59e0b;
            --bg-main: #fafaf9;
            --bg-card: #ffffff;
            --text-primary: #1c1917;
            --text-secondary: #57534e;
            --border: #e7e5e4;
            --shadow: rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: linear-gradient(135deg, #fafaf9 0%, #f5f5f4 100%);
            color: var(--text-primary);
        }

        .navbar {
            background: var(--bg-card);
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 10px var(--shadow);
        }

        .navbar-brand {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
        }

        .navbar-menu {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .navbar-menu a {
            text-decoration: none;
            color: var(--text-secondary);
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .navbar-menu a:hover {
            color: var(--primary);
        }

        .logout-btn {
            background: var(--accent);
            color: white;
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: #e59400;
            transform: translateY(-2px);
        }

        .container {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .page-header h1 {
            font-size: 2rem;
            color: var(--primary);
        }

        .back-btn {
            background: var(--primary);
            color: white;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: #0d5e57;
            transform: translateY(-2px);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--bg-card);
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 2px 10px var(--shadow);
            border-left: 4px solid var(--primary);
        }

        .stat-card h3 {
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        .stat-card .value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
        }

        .table-container {
            background: var(--bg-card);
            border-radius: 12px;
            box-shadow: 0 2px 10px var(--shadow);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: var(--primary);
            color: white;
        }

        th {
            padding: 1rem;
            text-align: left;
            font-weight: 600;
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
        }

        tbody tr:hover {
            background: #f9f9f9;
        }

        .category-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            background: var(--primary);
            color: white;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .amount {
            font-weight: 600;
            color: var(--primary);
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">ExpenseTracker Admin</div>
        <div class="navbar-menu">
            <a href="/admin/dashboard">Dashboard</a>
            <a href="/admin/users">Users</a>
            <a href="/">Home</a>
            <a href="/auth/logout" class="logout-btn">Logout ([[${adminUser.username}]])</a>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1>Expenses for <span th:text="${user.username}"></span></h1>
            <a href="/admin/users" class="back-btn">Back to Users</a>
        </div>

        <div class="stats">
            <div class="stat-card">
                <h3>User Email</h3>
                <div class="value" th:text="${user.email}">email@example.com</div>
            </div>
            <div class="stat-card">
                <h3>Total Expenses</h3>
                <div class="value" th:text="'$' + ${#numbers.formatDecimal(totalExpenses, 1, 2)}">$0.00</div>
            </div>
        </div>

        <div class="table-container">
            <th:block th:if="${expenses.size() > 0}">
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Category</th>
                            <th>Description</th>
                            <th>Amount</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="expense : ${expenses}">
                            <td th:text="${expense.date}">2024-01-01</td>
                            <td>
                                <span class="category-badge" th:text="${expense.category}">Food</span>
                            </td>
                            <td th:text="${expense.description}">Description</td>
                            <td class="amount" th:text="'$' + ${#numbers.formatDecimal(expense.amount, 1, 2)}">$0.00</td>
                        </tr>
                    </tbody>
                </table>
            </th:block>
            <div th:if="${expenses.size() == 0}" class="empty-state">
                <p>No expenses for this user</p>
            </div>
        </div>
    </div>
</body>
</html>
