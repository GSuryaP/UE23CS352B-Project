<!DOCTYPE html>
<html>
<head>
    <title>Manage Users - Expense Tracker</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0f766e;
            --primary-light: #14b8a6;
            --accent: #f59e0b;
            --bg-main: #fafaf9;
            --bg-card: #ffffff;
            --text-primary: #1c1917;
            --text-secondary: #57534e;
            --border: #e7e5e4;
            --shadow: rgba(0, 0, 0, 0.1);
            --danger: #dc2626;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: linear-gradient(135deg, #fafaf9 0%, #f5f5f4 100%);
            color: var(--text-primary);
        }

        .navbar {
            background: var(--bg-card);
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 10px var(--shadow);
        }

        .navbar-brand {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
        }

        .navbar-menu {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .navbar-menu a {
            text-decoration: none;
            color: var(--text-secondary);
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .navbar-menu a:hover, .navbar-menu a.active {
            color: var(--primary);
        }

        .logout-btn {
            background: var(--accent);
            color: white;
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: #e59400;
            transform: translateY(-2px);
        }

        .container {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        .page-header {
            margin-bottom: 2rem;
        }

        .page-header h1 {
            font-size: 2rem;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        .table-container {
            background: var(--bg-card);
            border-radius: 12px;
            box-shadow: 0 2px 10px var(--shadow);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: var(--primary);
            color: white;
        }

        th {
            padding: 1rem;
            text-align: left;
            font-weight: 600;
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
        }

        tbody tr:hover {
            background: #f9f9f9;
        }

        .role-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .role-badge.admin {
            background: #dbeafe;
            color: #1e40af;
        }

        .role-badge.user {
            background: #dbeafe;
            color: #1e40af;
        }

        .action-buttons {
            display: flex;
            gap: 0.5rem;
        }

        .btn-small {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 4px;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-block;
        }

        .btn-view {
            background: var(--primary);
            color: white;
        }

        .btn-view:hover {
            background: #0d5e57;
        }

        .btn-promote {
            background: #22c55e;
            color: white;
        }

        .btn-promote:hover {
            background: #16a34a;
        }

        .btn-demote {
            background: var(--accent);
            color: white;
        }

        .btn-demote:hover {
            background: #e59400;
        }

        .btn-delete {
            background: var(--danger);
            color: white;
        }

        .btn-delete:hover {
            background: #b91c1c;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">ExpenseTracker Admin</div>
        <div class="navbar-menu">
            <a href="/admin/dashboard">Dashboard</a>
            <a href="/admin/users" class="active">Users</a>
            <a href="/">Home</a>
            <a href="/auth/logout" class="logout-btn">Logout ([[${adminUser.username}]])</a>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1>Manage Users</h1>
        </div>

        <div class="table-container">
            <th:block th:if="${users.size() > 0}">
                <table>
                    <thead>
                        <tr>
                            <th>Username</th>
                            <th>Email</th>
                            <th>Role</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="user : ${users}">
                            <td th:text="${user.username}">username</td>
                            <td th:text="${user.email}">email</td>
                            <td>
                                <span class="role-badge" th:classappend="${user.admin} ? 'admin' : 'user'" th:text="${user.role}">USER</span>
                            </td>
                            <td>
                                <div class="action-buttons">
                                    <a th:href="@{/admin/user/{id}/expenses(id=${user.id})}" class="btn-small btn-view">View Expenses</a>
                                    <th:block th:if="${!user.admin}">
                                        <form th:action="@{/admin/user/{id}/toggle-role(id=${user.id})}" method="post" style="display:inline;">
                                            <input type="hidden" name="action" value="promote">
                                            <button type="submit" class="btn-small btn-promote">Promote</button>
                                        </form>
                                    </th:block>
                                    <th:block th:if="${user.admin}">
                                        <form th:action="@{/admin/user/{id}/toggle-role(id=${user.id})}" method="post" style="display:inline;">
                                            <input type="hidden" name="action" value="demote">
                                            <button type="submit" class="btn-small btn-demote">Demote</button>
                                        </form>
                                    </th:block>
                                    <a th:href="@{/admin/user/{id}/delete(id=${user.id})}" class="btn-small btn-delete" onclick="return confirm('Are you sure you want to delete this user?')">Delete</a>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </th:block>
            <div th:if="${users.size() == 0}" class="empty-state">
                <p>No users to display</p>
            </div>
        </div>
    </div>
</body>
</html>
