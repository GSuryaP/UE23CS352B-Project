<!DOCTYPE html>
<html>
<head>
    <title>Manage Users - Expense Tracker</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <style>
        /* ──── Admin Navbar ──── */
        .navbar {
            background: rgba(15, 23, 42, 0.97);
            padding: 0 2.5rem; height: 68px;
            display: flex; align-items: center; justify-content: space-between;
            box-shadow: 0 1px 0 rgba(255,255,255,0.08), 0 4px 24px rgba(0,0,0,0.3);
            position: sticky; top: 0; z-index: 200;
            backdrop-filter: blur(12px);
        }
        .navbar::after {
            content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, var(--accent), #f59e0b, var(--primary-light));
        }
        .navbar-brand {
            font-family: 'Playfair Display', serif;
            font-size: 1.25rem; font-weight: 700;
            color: white; text-decoration: none;
            display: flex; align-items: center; gap: 0.6rem;
        }
        .brand-icon {
            width: 32px; height: 32px;
            background: linear-gradient(135deg, var(--accent), #ea580c);
            border-radius: 8px; display: flex; align-items: center; justify-content: center;
        }
        .brand-icon svg { width: 16px; height: 16px; stroke: white; stroke-width: 2.5; fill: none; }
        .admin-badge {
            font-size: 0.62rem; font-weight: 700;
            background: var(--accent); color: white;
            padding: 0.18rem 0.55rem; border-radius: 4px;
            letter-spacing: 0.8px; text-transform: uppercase;
        }
        .navbar-links { display: flex; gap: 0.25rem; align-items: center; }
        .navbar-links a {
            color: rgba(255,255,255,0.65); text-decoration: none;
            font-weight: 600; font-size: 0.88rem;
            padding: 0.45rem 0.9rem; border-radius: var(--radius-sm); transition: all 0.25s ease;
        }
        .navbar-links a:hover { background: rgba(255,255,255,0.1); color: white; }
        .navbar-links a.nav-active { background: rgba(255,255,255,0.15); color: white; }
        .logout-btn-dark {
            background: linear-gradient(135deg, var(--accent), #ea580c);
            color: white !important; padding: 0.45rem 1rem !important;
            border-radius: var(--radius-sm) !important; font-weight: 700 !important;
            box-shadow: 0 2px 8px rgba(245,158,11,0.35);
        }
        .logout-btn-dark:hover { opacity: 0.9; transform: translateY(-1px); }

        /* ──── Layout ──── */
        body { background: #f1f5f9; }
        .container {
            max-width: 1100px; margin: 3rem auto; padding: 0 2rem;
            animation: fadeInUp 0.6s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ──── Page Header ──── */
        .page-header {
            display: flex; justify-content: space-between; align-items: flex-end;
            margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem;
        }
        .page-eyebrow {
            font-size: 0.78rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 1.2px;
            color: var(--accent); margin-bottom: 0.4rem;
        }
        .page-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem; font-weight: 700;
            color: #0f172a; letter-spacing: -0.5px;
        }
        .user-count-badge {
            display: inline-flex; align-items: center; gap: 0.4rem;
            background: white; border: 1px solid var(--border);
            padding: 0.5rem 1rem; border-radius: 20px;
            font-size: 0.88rem; font-weight: 600; color: var(--text-secondary);
            box-shadow: 0 1px 6px rgba(0,0,0,0.06);
        }
        .user-count-badge strong { color: var(--primary); }

        /* ──── Table Card ──── */
        .table-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            box-shadow: 0 4px 20px rgba(0,0,0,0.07);
            overflow: hidden;
        }
        table { width: 100%; border-collapse: collapse; }
        thead { background: #0f172a; }
        th {
            padding: 1rem 1.25rem;
            text-align: left; font-weight: 700;
            font-size: 0.78rem; color: rgba(255,255,255,0.75);
            text-transform: uppercase; letter-spacing: 0.6px;
        }
        tbody tr { border-bottom: 1px solid var(--border); transition: background 0.2s ease; }
        tbody tr:hover { background: #f8fafc; }
        tbody tr:last-child { border-bottom: none; }
        td { padding: 1rem 1.25rem; color: var(--text-primary); font-size: 0.93rem; vertical-align: middle; }

        /* User info cell */
        .user-cell { display: flex; align-items: center; gap: 0.75rem; }
        .user-ava {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 0.85rem; font-weight: 700; color: white; flex-shrink: 0;
        }
        .user-ava.admin-ava { background: linear-gradient(135deg, var(--accent), #ea580c); }
        .user-meta-name { font-weight: 700; font-size: 0.95rem; }
        .user-meta-email { font-size: 0.82rem; color: var(--text-secondary); }

        /* Role badge */
        .role-badge {
            display: inline-flex; align-items: center; gap: 0.4rem;
            padding: 0.3rem 0.85rem; border-radius: 20px;
            font-size: 0.8rem; font-weight: 700;
        }
        .role-badge.admin {
            background: linear-gradient(135deg, #fed7aa, #fdba74);
            color: #92400e;
        }
        .role-badge.user {
            background: linear-gradient(135deg, #dbeafe, #bfdbfe);
            color: #1e40af;
        }
        .role-badge::before { content: '●'; font-size: 0.5rem; }

        /* Action buttons */
        .action-buttons { display: flex; gap: 0.5rem; flex-wrap: wrap; }
        .btn-sm {
            padding: 0.42rem 0.85rem;
            border: none; border-radius: 6px;
            text-decoration: none; font-weight: 700;
            font-size: 0.8rem; cursor: pointer;
            transition: all 0.25s ease; display: inline-block;
            font-family: 'DM Sans', sans-serif;
        }
        .btn-view   { background: linear-gradient(135deg, var(--primary), var(--primary-light)); color: white; box-shadow: 0 2px 6px rgba(15,118,110,0.25); }
        .btn-view:hover   { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(15,118,110,0.35); }
        .btn-promote { background: linear-gradient(135deg, #22c55e, #16a34a); color: white; box-shadow: 0 2px 6px rgba(34,197,94,0.25); }
        .btn-promote:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(34,197,94,0.35); }
        .btn-demote  { background: linear-gradient(135deg, var(--accent), #d97706); color: white; box-shadow: 0 2px 6px rgba(245,158,11,0.25); }
        .btn-demote:hover  { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(245,158,11,0.35); }
        .btn-delete  { background: linear-gradient(135deg, #ef4444, #dc2626); color: white; box-shadow: 0 2px 6px rgba(220,38,38,0.25); }
        .btn-delete:hover  { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(220,38,38,0.35); }

        /* Empty state */
        .empty-state {
            text-align: center; padding: 4rem 2rem; color: var(--text-secondary);
        }
        .empty-state svg { width: 56px; height: 56px; stroke: var(--border); stroke-width: 1.5; fill: none; margin-bottom: 1rem; }
        .empty-state p { font-size: 1.05rem; font-weight: 500; }

        /* ──── Responsive ──── */
        @media (max-width: 768px) {
            .navbar { padding: 0 1.25rem; }
            .container { margin: 2rem auto; padding: 0 1rem; }
            .table-card { overflow-x: auto; }
            table { min-width: 700px; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="/admin/dashboard" class="navbar-brand">
            <div class="brand-icon">
                <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            </div>
            ExpenseTracker
            <span class="admin-badge">Admin</span>
        </a>
        <div class="navbar-links">
            <a href="/admin/dashboard">Dashboard</a>
            <a href="/admin/users" class="nav-active">Users</a>
            <a href="/">← Home</a>
            <a href="/auth/logout" class="logout-btn-dark">Logout ([[${adminUser.username}]])</a>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <div>
                <div class="page-eyebrow">User Management</div>
                <h1>All Users</h1>
            </div>
            <div class="user-count-badge">
                <span>Total:</span>
                <strong th:text="${users.size()}">0</strong> users
            </div>
        </div>

        <div class="table-card">
            <th:block th:if="${users.size() > 0}">
                <table>
                    <thead>
                        <tr>
                            <th>User</th>
                            <th>Role</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="user : ${users}">
                            <td>
                                <div class="user-cell">
                                    <div class="user-ava" th:classappend="${user.admin} ? 'admin-ava' : ''"
                                         th:text="${#strings.substring(user.username, 0, 1).toUpperCase()}">U</div>
                                    <div>
                                        <div class="user-meta-name" th:text="${user.username}">username</div>
                                        <div class="user-meta-email" th:text="${user.email}">email</div>
                                    </div>
                                </div>
                            </td>
                            <td>
                                <span class="role-badge" th:classappend="${user.admin} ? 'admin' : 'user'" th:text="${user.role}">USER</span>
                            </td>
                            <td>
                                <div class="action-buttons">
                                    <a th:href="@{/admin/user/{id}/expenses(id=${user.id})}" class="btn-sm btn-view">View Expenses</a>
                                    <th:block th:if="${!user.admin}">
                                        <form th:action="@{/admin/user/{id}/toggle-role(id=${user.id})}" method="post" style="display:inline;">
                                            <input type="hidden" name="action" value="promote">
                                            <button type="submit" class="btn-sm btn-promote">↑ Promote</button>
                                        </form>
                                    </th:block>
                                    <th:block th:if="${user.admin}">
                                        <form th:action="@{/admin/user/{id}/toggle-role(id=${user.id})}" method="post" style="display:inline;">
                                            <input type="hidden" name="action" value="demote">
                                            <button type="submit" class="btn-sm btn-demote">↓ Demote</button>
                                        </form>
                                    </th:block>
                                    <a th:href="@{/admin/user/{id}/delete(id=${user.id})}" class="btn-sm btn-delete"
                                       onclick="return confirm('Are you sure you want to delete this user?')">✕ Delete</a>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </th:block>
            <div th:if="${users.size() == 0}" class="empty-state">
                <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
                <p>No users to display</p>
            </div>
        </div>
    </div>
</body>
</html>
