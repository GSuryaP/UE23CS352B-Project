<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Expense - Expense Tracker</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <style>
        /* ──── Shared Navbar ──── */
        .navbar {
            background: rgba(255,255,255,0.96);
            padding: 0 2.5rem;
            height: 68px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 1px 0 var(--border), 0 4px 20px rgba(0,0,0,0.06);
            position: sticky;
            top: 0;
            z-index: 200;
            backdrop-filter: blur(12px);
        }
        .navbar::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--primary), var(--primary-light), var(--accent));
        }
        .navbar-brand {
            font-family: 'Playfair Display', serif;
            font-size: 1.35rem;
            font-weight: 700;
            color: var(--primary);
            text-decoration: none;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }
        .navbar-brand .brand-icon {
            width: 32px; height: 32px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
        }
        .navbar-brand .brand-icon svg {
            width: 16px; height: 16px;
            stroke: white; stroke-width: 2.5; fill: none;
        }
        .navbar-links {
            display: flex;
            gap: 0.25rem;
            align-items: center;
        }
        .navbar-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            padding: 0.45rem 0.9rem;
            border-radius: var(--radius-sm);
            transition: all 0.25s ease;
        }
        .navbar-links a:hover { background: var(--bg-main); color: var(--primary); }
        .navbar-links a.nav-active { background: var(--primary); color: white; }
        .user-chip {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-left: 0.5rem;
            padding-left: 1rem;
            border-left: 1px solid var(--border);
        }
        .user-avatar {
            width: 32px; height: 32px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.8rem; font-weight: 700; color: white;
        }
        .user-name { font-size: 0.88rem; font-weight: 600; color: var(--text-primary); }
        .logout-btn {
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            color: white !important;
            padding: 0.45rem 1rem !important;
            border-radius: var(--radius-sm) !important;
            font-weight: 700 !important;
            box-shadow: 0 2px 8px rgba(245,158,11,0.3);
        }
        .logout-btn:hover {
            background: var(--accent-dark) !important;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(245,158,11,0.4) !important;
        }

        /* ──── Page Layout ──── */
        .container {
            max-width: 660px;
            margin: 3.5rem auto;
            padding: 0 1.5rem;
            animation: fadeInUp 0.6s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(28px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ──── Page Header ──── */
        .page-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }
        .icon-wrapper {
            width: 64px; height: 64px;
            background: linear-gradient(135deg, var(--primary-light), var(--primary));
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1.25rem;
            box-shadow: 0 8px 24px rgba(15,118,110,0.3);
        }
        .icon-wrapper svg {
            width: 28px; height: 28px;
            stroke: white; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; fill: none;
        }
        h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2.25rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.4rem;
            letter-spacing: -0.5px;
        }
        .subtitle { color: var(--text-secondary); font-size: 0.97rem; }

        /* ──── Form Card ──── */
        .form-card {
            background: var(--bg-card);
            padding: 2.5rem;
            border-radius: var(--radius-xl);
            border: 1px solid var(--border);
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            animation: fadeInUp 0.6s ease 0.15s backwards;
        }

        form { display: flex; flex-direction: column; gap: 1.4rem; }

        .form-group { display: flex; flex-direction: column; gap: 0.45rem; }

        label {
            font-weight: 600;
            color: var(--text-primary);
            font-size: 0.88rem;
            letter-spacing: 0.2px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        label .label-dot {
            width: 6px; height: 6px;
            background: var(--primary);
            border-radius: 50%;
            flex-shrink: 0;
        }

        input[type="text"],
        input[type="number"],
        input[type="date"],
        select {
            padding: 0.82rem 1rem;
            border: 2px solid var(--border);
            border-radius: var(--radius-md);
            font-size: 0.97rem;
            font-family: 'DM Sans', sans-serif;
            transition: all 0.3s ease;
            background: var(--bg-main);
            color: var(--text-primary);
            width: 100%;
        }
        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(15,118,110,0.1);
            transform: translateY(-1px);
        }
        input::placeholder { color: #a8a29e; }
        select {
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%2357534e' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 1rem center;
            padding-right: 3rem;
        }
        .input-hint { font-size: 0.8rem; color: var(--text-secondary); }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.25rem;
        }

        button[type="submit"] {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
            padding: 1rem 2rem;
            border: none;
            border-radius: var(--radius-md);
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 0.5rem;
            font-family: 'DM Sans', sans-serif;
            box-shadow: 0 4px 14px rgba(15,118,110,0.3);
            position: relative;
            overflow: hidden;
        }
        button[type="submit"]::after {
            content: '';
            position: absolute; top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }
        button[type="submit"]:hover { transform: translateY(-2px); box-shadow: 0 8px 22px rgba(15,118,110,0.4); }
        button[type="submit"]:hover::after { left: 100%; }
        button[type="submit"]:active { transform: translateY(0); }

        /* ──── Responsive ──── */
        @media (max-width: 768px) {
            .navbar { padding: 0 1.25rem; }
            .user-name { display: none; }
            .container { margin: 2.5rem auto; }
            .form-card { padding: 1.75rem 1.25rem; }
            h2 { font-size: 1.85rem; }
            .form-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <a href="/" class="navbar-brand">
        <div class="brand-icon">
            <svg viewBox="0 0 24 24"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
        </div>
        ExpenseTracker
    </a>
    <div class="navbar-links">
        <a href="/add" class="nav-active">Add Expense</a>
        <a href="/view">View Expenses</a>
        <a href="/summary">Summary</a>
        <div class="user-chip">
            <div class="user-avatar" th:text="${#strings.substring(user?.username ?: 'U', 0, 1).toUpperCase()}">U</div>
            <span class="user-name" th:text="${user?.username ?: 'User'}">User</span>
            <a href="/auth/logout" class="logout-btn">Logout</a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="page-header">
        <div class="icon-wrapper">
            <svg viewBox="0 0 24 24"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
        </div>
        <h2>Add New Expense</h2>
        <p class="subtitle">Track your spending and stay on budget</p>
    </div>

    <div class="form-card">
        <form th:action="@{/add}" th:object="${expense}" method="post">
            <div class="form-row">
                <div class="form-group">
                    <label><span class="label-dot"></span>Date</label>
                    <input type="date" th:field="*{date}" required />
                </div>
                <div class="form-group">
                    <label><span class="label-dot"></span>Amount (₹)</label>
                    <input type="number" th:field="*{amount}" step="0.01" min="0" placeholder="0.00" required />
                </div>
            </div>

            <div class="form-group">
                <label><span class="label-dot"></span>Category</label>
                <input type="text" th:field="*{category}" placeholder="e.g., Food, Transport, Shopping" required />
                <span class="input-hint">Choose a category to organize your expenses</span>
            </div>

            <div class="form-group">
                <label><span class="label-dot"></span>Description</label>
                <input type="text" th:field="*{description}" placeholder="Brief description of the expense" />
                <span class="input-hint">Optional: Add notes to remember what this was for</span>
            </div>

            <button type="submit">
                + Add Expense
            </button>
        </form>
    </div>
</div>

</body>
</html>
