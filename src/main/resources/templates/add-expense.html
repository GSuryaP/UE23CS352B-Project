<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Expense - Expense Tracker</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0f766e;
            --primary-light: #14b8a6;
            --primary-dark: #0d5e57;
            --accent: #f59e0b;
            --bg-main: #fafaf9;
            --bg-card: #ffffff;
            --text-primary: #1c1917;
            --text-secondary: #57534e;
            --border: #e7e5e4;
            --shadow: rgba(0, 0, 0, 0.1);
            --success: #10b981;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: linear-gradient(135deg, #fafaf9 0%, #f5f5f4 100%);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* Navbar Styles */
        .navbar {
            background: var(--bg-card);
            padding: 1.5rem 2rem;
            display: flex;
            gap: 2rem;
            align-items: center;
            box-shadow: 0 2px 10px var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.95);
        }

        .navbar::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary) 0%, var(--accent) 100%);
        }

        .navbar a {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            transition: all 0.3s ease;
            position: relative;
        }

        .navbar a:first-child {
            margin-right: auto;
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--primary);
        }

        .navbar a:not(:first-child):hover {
            background: var(--bg-main);
            color: var(--primary);
            transform: translateY(-2px);
        }

        .navbar a:nth-child(2) {
            background: var(--primary);
            color: white;
        }

        .navbar a:nth-child(2):hover {
            background: var(--primary-dark);
            color: white;
        }

        /* Container */
        .container {
            max-width: 650px;
            margin: 4rem auto;
            padding: 0 2rem;
            animation: fadeInUp 0.6s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Header Section */
        .page-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1rem;
        }

        /* Form Card */
        .form-card {
            background: var(--bg-card);
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 
                0 4px 20px rgba(0, 0, 0, 0.08),
                0 0 0 1px var(--border);
            animation: fadeInUp 0.6s ease 0.2s backwards;
        }

        /* Form Styles */
        form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-weight: 500;
            color: var(--text-primary);
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        label::before {
            content: '';
            width: 4px;
            height: 18px;
            background: var(--primary);
            border-radius: 2px;
        }

        input[type="text"],
        input[type="number"],
        input[type="date"],
        select {
            padding: 0.875rem 1.125rem;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 1rem;
            font-family: 'DM Sans', sans-serif;
            transition: all 0.3s ease;
            background: var(--bg-main);
            color: var(--text-primary);
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        input[type="date"]:focus,
        select:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(15, 118, 110, 0.1);
            transform: translateY(-1px);
        }

        input[type="text"]::placeholder,
        input[type="number"]::placeholder {
            color: #a8a29e;
        }

        /* Category Select Enhancement */
        select {
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%2357534e' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 1rem center;
            padding-right: 3rem;
        }

        /* Button */
        button[type="submit"] {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            padding: 1rem 2rem;
            border: none;
            border-radius: 12px;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
            font-family: 'DM Sans', sans-serif;
            box-shadow: 0 4px 12px rgba(15, 118, 110, 0.3);
            position: relative;
            overflow: hidden;
        }

        button[type="submit"]::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        button[type="submit"]:hover::before {
            left: 100%;
        }

        button[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(15, 118, 110, 0.4);
        }

        button[type="submit"]:active {
            transform: translateY(0);
        }

        /* Form Grid for Date and Amount */
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        /* Success Icon */
        .icon-wrapper {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--primary-light) 0%, var(--primary) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            box-shadow: 0 8px 16px rgba(15, 118, 110, 0.3);
        }

        .icon-wrapper svg {
            width: 30px;
            height: 30px;
            stroke: white;
            stroke-width: 3;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .container {
                margin: 2rem auto;
                padding: 0 1rem;
            }

            .form-card {
                padding: 2rem 1.5rem;
            }

            h2 {
                font-size: 2rem;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .navbar {
                padding: 1rem;
                gap: 1rem;
                flex-wrap: wrap;
            }

            .navbar a:first-child {
                width: 100%;
                margin-bottom: 0.5rem;
            }
        }

        /* Input hints */
        .input-hint {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: -0.25rem;
        }
    </style>
</head>
<body>

<div class="navbar">
    <a href="/" class="navbar-brand">ExpenseTracker</a>
    <div class="navbar-links">
        <a href="/add">Add Expense</a>
        <a href="/view">View Expenses</a>
        <a href="/summary">Summary</a>
        <div class="user-info">
            <span style="font-weight: 500;">Welcome, <span th:text="${user?.username ?: 'User'}">User</span></span>
            <a href="/auth/logout" class="logout-btn">Logout</a>
        </div>
    </div>
</div>

<div class="container">
    <div class="page-header">
        <div class="icon-wrapper">
            <svg viewBox="0 0 24 24">
                <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
            </svg>
        </div>
        <h2>Add New Expense</h2>
        <p class="subtitle">Track your spending and stay on budget</p>
    </div>

    <div class="form-card">
        <form th:action="@{/add}" th:object="${expense}" method="post">
            <div class="form-row">
                <div class="form-group">
                    <label>Date</label>
                    <input type="date" th:field="*{date}" required />
                </div>

                <div class="form-group">
                    <label>Amount</label>
                    <input type="number" th:field="*{amount}" step="0.01" min="0" placeholder="0.00" required />
                </div>
            </div>

            <div class="form-group">
                <label>Category</label>
                <input type="text" th:field="*{category}" placeholder="e.g., Food, Transport, Shopping" required />
                <span class="input-hint">Choose a category to organize your expenses</span>
            </div>

            <div class="form-group">
                <label>Description</label>
                <input type="text" th:field="*{description}" placeholder="Brief description of the expense" />
                <span class="input-hint">Optional: Add notes to remember what this was for</span>
            </div>

            <button type="submit">Add Expense</button>
        </form>
    </div>
</div>

</body>
</html>
