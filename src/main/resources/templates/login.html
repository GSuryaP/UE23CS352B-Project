<!DOCTYPE html>
<html>
<head>
    <title>Login - Expense Tracker</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'DM Sans', sans-serif;
            background: linear-gradient(135deg, #0f766e 0%, #0d5e57 40%, #14b8a6 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

        /* Decorative blobs */
        body::before {
            content: '';
            position: fixed;
            top: -120px;
            right: -80px;
            width: 420px;
            height: 420px;
            background: radial-gradient(circle, rgba(245,158,11,0.25) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -100px;
            left: -80px;
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, rgba(255,255,255,0.12) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        .auth-wrapper {
            width: 100%;
            max-width: 440px;
            animation: slideUp 0.7s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Logo strip */
        .brand-top {
            text-align: center;
            margin-bottom: 2rem;
        }
        .brand-top .logo-icon {
            width: 56px;
            height: 56px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 0.75rem;
        }
        .brand-top .logo-icon svg {
            width: 26px;
            height: 26px;
            stroke: white;
            stroke-width: 2.5;
            fill: none;
        }
        .brand-top span {
            font-family: 'Playfair Display', serif;
            font-size: 1.25rem;
            font-weight: 700;
            color: rgba(255,255,255,0.95);
            letter-spacing: -0.5px;
        }

        /* Card */
        .auth-container {
            width: 100%;
            background: rgba(255,255,255,0.97);
            backdrop-filter: blur(20px);
            padding: 2.75rem 2.5rem;
            border-radius: 24px;
            box-shadow:
                0 20px 60px rgba(0,0,0,0.2),
                0 0 0 1px rgba(255,255,255,0.6);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .auth-header h1 {
            font-family: 'Playfair Display', serif;
            color: var(--primary);
            font-size: 1.9rem;
            font-weight: 700;
            margin-bottom: 0.4rem;
            letter-spacing: -0.5px;
        }
        .auth-header p {
            color: var(--text-secondary);
            font-size: 0.92rem;
        }

        /* Divider */
        .form-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border), transparent);
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.4rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
            font-weight: 600;
            font-size: 0.88rem;
            letter-spacing: 0.2px;
        }
        .form-group .input-wrap {
            position: relative;
        }
        .form-group .input-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            stroke: var(--text-secondary);
            stroke-width: 2;
            fill: none;
            pointer-events: none;
            transition: stroke 0.3s ease;
        }
        .form-group input {
            width: 100%;
            padding: 0.8rem 1rem 0.8rem 2.85rem;
            border: 2px solid var(--border);
            border-radius: var(--radius-md);
            font-size: 0.95rem;
            font-family: 'DM Sans', sans-serif;
            color: var(--text-primary);
            background: var(--bg-main);
            transition: all 0.3s ease;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(15,118,110,0.1);
        }
        .form-group input:focus + .input-icon,
        .form-group .input-wrap:focus-within .input-icon {
            stroke: var(--primary);
        }
        /* icon sits after input in DOM but visually positioned absolute */
        .form-group .input-wrap input:focus ~ .input-icon {
            stroke: var(--primary);
        }

        .btn {
            width: 100%;
            padding: 0.88rem;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-size: 1rem;
            font-weight: 700;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 14px rgba(15,118,110,0.35);
            position: relative;
            overflow: hidden;
            letter-spacing: 0.3px;
        }
        .btn::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent);
            transition: left 0.5s ease;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(15,118,110,0.4); }
        .btn:hover::after { left: 100%; }
        .btn:active { transform: translateY(0); }

        .error {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #b91c1c;
            padding: 0.85rem 1rem;
            border-radius: var(--radius-sm);
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .error::before { content: '⚠'; font-size: 1rem; }

        .auth-footer {
            text-align: center;
            margin-top: 1.6rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        .auth-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 700;
            transition: color 0.2s;
        }
        .auth-footer a:hover { color: var(--primary-dark); text-decoration: underline; }
    </style>
</head>
<body>
    <div class="auth-wrapper">
        <div class="brand-top">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
            </div>
            <span>ExpenseTracker</span>
        </div>

        <div class="auth-container">
            <div class="auth-header">
                <h1>Welcome Back</h1>
                <p>Sign in to manage your finances</p>
            </div>
            <div class="form-divider"></div>

            <form method="post" action="/auth/login">
                <div th:if="${error}" class="error" th:text="${error}"></div>

                <div class="form-group">
                    <label for="username">Username</label>
                    <div class="input-wrap">
                        <input type="text" id="username" name="username" placeholder="Enter your username" required>
                        <svg class="input-icon" viewBox="0 0 24 24">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrap">
                        <input type="password" id="password" name="password" placeholder="Enter your password" required>
                        <svg class="input-icon" viewBox="0 0 24 24">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                    </div>
                </div>

                <button type="submit" class="btn">Sign In</button>
            </form>

            <div class="auth-footer">
                Don't have an account? <a href="/auth/register">Create one free</a>
            </div>
        </div>
    </div>
</body>
</html>
